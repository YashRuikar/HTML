<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>

<body>
    <div>
        <h1>Travel form for our trip</h1>
        <form action="form.php">

            <!-- Input Element -->
            <input type="text" placeholder="Enter Your Name"><br>
            <label for="sectionida">
                <input type="radio" value="Section a" name="section" id="sectionid"> Section A
            </label>

            <label for="sectionidb">
                <input type="radio" value="Section b" name="section" id="sectionidb"> Section B
            </label>

            <label for="sectionidc">
                <input type="radio" value="Section c" name="section" id="sectionidc"> Section C
            </label><br>

            <input type="checkbox" id="foodcanteen" class="red" name="canteen">
            <label for="foodcanteen">Want food canteen card
            </label><br>

            <!-- Textarea Element -->
            <textarea name="explain" id="explain" cols="30" rows="10"
                placeholder="Explain why you want to join"></textarea><br>

            <!-- Select Element -->
            <select name="car" id="car">

                <option value="no-car">Select your car</option>
                <option value="creta">Creta</option>
                <option value="harrier">Harrier</option>
                <option value="i20">i20</option>
            </select>
        </form>
    </div>
</body>

</html>
